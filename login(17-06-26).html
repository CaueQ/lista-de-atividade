{% extends 'base.html' %}
{% block titulo %}Login{% endblock %}
{% block url %}localhost:5000/login{% endblock %}

{% block conteudo %}
    <div class="hero-icon"><i class="ti ti-lock"></i></div>
    <h1>Login</h1>
    <p class="subtitle">Insira suas credenciais para acessar o sistema.</p>

    {% if erro %}
        <div class="alert-erro">
            <i class="ti ti-alert-triangle"></i>
            {{ erro }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
        <div class="field-group">
            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required autocomplete="username">
        </div>
        <div class="field-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <hr class="divider">
    <p class="link-muted"><a href="{{ url_for('index') }}">← Voltar para a página inicial</a></p>
{% endblock %}
