<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Cantinho</title>
</head>
<body>

    <h1>Meu Cantinho</h1>

    <h2>Olá, {{ nome }}!</h2>

    <p>Este é o seu cantinho secreto.</p>

    <h3>Minhas informações</h3>

    <p><strong>Minha cor favorita:</strong> {{ cor }}</p>

    <p><strong>Minha linguagem de programação favorita:</strong> {{ linguagem }}</p>

    <p><strong>Uma frase que me representa:</strong> {{ frase }}</p>

    <p>Você visitou esse cantinho {{ visitas }} vez(es) hoje.</p>

    <a href="{{ url_for('painel') }}">← Voltar ao painel</a>

</body>
</html>
