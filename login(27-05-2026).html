<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Login</title>
</head>
<body>
    <h2>Login</h2>

    <form action="{{ url_for('recebedados') }}" method="post">
        <label for="estado">Estado:</label>
        <select id="estado" name="estado">
            <option value="RN">Rio Grande do Norte</option>
            <option value="PB">Paraíba</option>
            <option value="PE">Pernambuco</option>
            <option value="CE">Ceará</option>
        </select><br><br>

        <label>Qual a sua formação?</label><br>
        <input type="radio" id="fundamental" name="formacao" value="fundamental">
        <label for="fundamental">Ensino Fundamental</label><br>

        <input type="radio" id="medio" name="formacao" value="medio">
        <label for="medio">Ensino Médio</label><br>

        <input type="radio" id="superior" name="formacao" value="superior">
        <label for="superior">Ensino Superior</label><br><br>

        <label>Selecione as modalidades de interesse:</label><br>
        <input type="checkbox" id="natacao" name="modalidades" value="natacao">
        <label for="natacao">Natação</label><br>

        <input type="checkbox" id="volei" name="modalidades" value="volei">
        <label for="volei">Vôlei</label><br>

        <input type="checkbox" id="futebol" name="modalidades" value="futebol">
        <label for="futebol">Futebol</label><br>

        <input type="checkbox" id="judo" name="modalidades" value="judo">
        <label for="judo">Judô</label><br><br>

        <button type="submit">Enviar</button>
    </form>

    <a href="/formregistrar">Registre-se</a>
    
</body>
</html>
